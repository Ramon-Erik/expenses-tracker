<label [for]="id() + '-id'" class="form-label mt-3">
  {{ label() }}
  @if (isRequired()) {
    <span class="text-danger">*</span>
  }
</label>

<input
  [type]="type()"
  [id]="id() + '-id'"
  [name]="id() + '-name'"
  [placeholder]="placeholder()"
  autocomplete="off"
  [(ngModel)]="inputValue"
  (focus)="onToutched && onToutched()"
  (input)="onChange && onChange(inputValue)"
  [disabled]="isDisabled"
  class="form-control"
/>
