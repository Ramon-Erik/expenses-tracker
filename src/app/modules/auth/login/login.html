<header>
  <app-logo/>
  <h1 class="text-center">Entre na sua conta</h1>
</header>
<main>
  <form [formGroup]="loginForm">
    <app-input-default
      id="email"
      label="Email"
      type="email"
      placeholder="Digite seu email"
      [isRequired]="true"
      formControlName="email"
      ></app-input-default>

    <app-input-default
      id="password"
      label="Senha"
      type="password"
      placeholder="Digite sua senha"
      [isRequired]="true"
      formControlName="password"
      ></app-input-default>

    <button type="button" (click)="log()" class="btn btn-primary w-100">Entrar</button>
  </form>
</main>
