<header class="d-flex flex-column p-4 align-items-center gap-3">
  <app-logo class="mt-4" [size]="64"/>
  <h1>Entre na sua conta</h1>
</header>
<main class="p-4">
  <form [formGroup]="loginForm" (ngSubmit)="login()">
    <app-input-default
      id="email"
      label="Email"
      type="email"
      placeholder="Digite seu email"
      [isRequired]="true"
      formControlName="email"
    />

    <app-input-default
      id="password"
      label="Senha"
      type="password"
      placeholder="Digite sua senha"
      [isRequired]="true"
      formControlName="password"
    />

    @if (authError) {
      <p class="mt-4 text-center text-danger">
        {{ authError }}
      </p>
    } 

    <button
      type="submit"
      [disabled]="!loginForm.valid || loading"
      class="btn custom-btn-primary mt-4 w-100"
    >
      Entrar
    </button>
  </form>
</main>
