<div class="mb-3">
  <label [for]="id() + '-id'" class="form-label">
    {{ label() }}
    @if (isRequired()) {
      <span class="text-danger">*</span>
    }
  </label>

  <input
    [type]="type()"
    [id]="id() + '-id'"
    [name]="id() + '-name'"
    [placeholder]="placeholder()"
    [required]="isRequired()"
    autocomplete="off"
    class="form-control"
  />
</div>
